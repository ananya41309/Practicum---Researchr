<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | MatchMaker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

  <nav class="app-nav">
    <a class="nav-brand" href="{{ url_for('index') }}">
      <div class="nav-logo-icon">M</div>
      <span class="nav-logo-text">MatchMaker</span>
    </a>
    <ul class="nav-links">
      <li><a href="{{ url_for('index') }}">Search</a></li>
      <li><a href="{{ url_for('saved') }}">Saved Grants</a></li>
      <li><a href="{{ url_for('profile') }}" class="active">Profile</a></li>
    </ul>
    <div class="nav-right">
      <a href="{{ url_for('profile') }}" class="nav-avatar" title="Your profile">JD</a>
    </div>
  </nav>

  <main class="page-shell">

    <div class="results-topbar" style="margin-bottom: 8px;">
      <div>
        <p class="results-heading-label">Account</p>
        <h1 class="results-heading">Your Profile</h1>
      </div>
    </div>

    <!-- Profile Card -->
    <div class="form-card" style="margin-bottom: 16px;">
      <div class="form-card-head">
        <h2>Personal Information</h2>
      </div>
      <div class="form-body">

        <div class="profile-avatar-row">
          <div class="profile-avatar-large">JD</div>
          <div>
            <p class="profile-name">Jane Doe</p>
            <p class="profile-role">Researcher · University of Illinois</p>
          </div>
        </div>

        <div class="form-divider"></div>

        <div class="form-row">
          <div class="field">
            <label>First Name</label>
            <input type="text" value="Jane" />
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" value="Doe" />
          </div>
        </div>

        <div class="field">
          <label>Email Address</label>
          <input type="text" value="jane.doe@university.edu" />
        </div>

        <div class="field">
          <label>Institution / University</label>
          <input type="text" value="University of Illinois" />
        </div>

        <div class="field">
          <label>Department</label>
          <input type="text" value="Department of Computer Science" />
        </div>

        <div class="field">
          <label>Research Field</label>
          <input type="text" value="Machine Learning, Biomedical Informatics" />
        </div>

        <div style="margin-top: 8px;">
          <button class="btn btn-primary">Save Changes</button>
        </div>

      </div>
    </div>

    <!-- Account Stats -->
    <div class="form-card" style="margin-bottom: 16px;">
      <div class="form-card-head">
        <h2>Activity</h2>
      </div>
      <div class="form-body">
        <div class="stats-grid">
          <div class="stat-card">
            <p class="stat-value" id="statSaved">—</p>
            <p class="stat-label">Grants Saved</p>
          </div>
          <div class="stat-card">
            <p class="stat-value">—</p>
            <p class="stat-label">Searches Run</p>
          </div>
          <div class="stat-card">
            <p class="stat-value">—</p>
            <p class="stat-label">Documents Uploaded</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Danger Zone -->
    <div class="form-card">
      <div class="form-card-head">
        <h2>Account</h2>
      </div>
      <div class="form-body">
        <p style="font-size:0.85rem; color:var(--text-3); margin-bottom:16px;">
          Sign out of your MatchMaker account on this device.
        </p>
        <a href="{{ url_for('login') }}" class="btn btn-ghost">Sign out</a>
      </div>
    </div>

  </main>

  <script>
    // Pull saved grant count from localStorage
    const saved = JSON.parse(localStorage.getItem('savedGrants') || '[]');
    document.getElementById('statSaved').textContent = saved.length;
  </script>

</body>
</html>
